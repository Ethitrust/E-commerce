name: Deploy Nexus

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /var/www/nexus

            # Match GitHub exactly (avoids "divergent branches" when someone commits on the VPS)
            git fetch origin
            git reset --hard origin/main

            echo "=== Backend Deploy ==="

            cd backend

            npm install

            npm run build

            pm2 restart nexus-backend || PORT=4000 pm2 start dist/index.js --name nexus-backend

            cd ..

            echo "=== Frontend Deploy ==="

            cd frontend

            npm install

            npm run build

            pm2 restart nexus-frontend || PORT=8080 pm2 start npm --name nexus-frontend -- start

            pm2 save
